<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Games – Abdul Rafay’s Adventures</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <meta name="theme-color" content="#2e0249">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    /* Small tweaks so the site's card centres its games list nicely */
    .games-card {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .games-card .eyebrow { align-self: center; }
    .games-card p { margin: 0 auto; }

    .games-list {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
    }
    /* Reuse the site's .trip-btn look, just make it work as a link */
    .games-list .trip-btn {
      text-decoration: none;
      margin: 0;
    }
  </style>
</head>

<body>

  <button id="hamburgerBtn" class="hamburger">&#9776;</button>
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="slide-menu" id="slideMenu">
    <button class="close-menu" id="closeMenuBtn">&times;</button>
    <a href="index.html" class="menu-item">Home</a>
    <a href="stories.html" class="menu-item">My Stories</a>
    <a href="learning.html" class="menu-item">Fun Learning</a>
    <a href="games.html" class="menu-item">My Games</a>
    <a href="chat.html" class="menu-item">Chat</a>
    <a href="about.html" class="menu-item">About Me</a>
  </div>

  <div class="top-wrapper">
    <div class="top-info">
      <span class="location-text">Where I now live</span>
      <div class="region"><img src="https://flagcdn.com/w20/gb.png" alt="UK Flag"></div>
      <div class="time" id="time-uk"></div>
      <div class="date" id="date-uk"></div>
      <div class="weather" id="weather-uk">Loading…</div>
    </div>
    <div class="top-info">
      <span class="location-text">Where I came from</span>
      <div class="region"><img src="https://flagcdn.com/w20/pk.png" alt="Pakistan Flag"></div>
      <div class="time" id="time-pk"></div>
      <div class="date" id="date-pk"></div>
      <div class="weather" id="weather-pk">Loading…</div>
    </div>
  </div>

  <div class="learning-card games-card">
    <div class="eyebrow">My Games</div>
    <h1>🎮 Play my games!</h1>
    <p>I’ve made <strong>2 games</strong> so far. Tap one to start playing!</p>

    <div class="games-list">
      <!-- ===== GAME: copy one block to add another game later ===== -->
      <a href="moving-the-sprite.html" class="trip-btn">
        <span class="btn-id">1</span>
        <span class="btn-text">🟢 Moving the Sprite Game</span>
      </a>
      <!-- ===== END GAME ===== -->

      <!-- ===== GAME ===== -->
      <a href="flappy-bird.html" class="trip-btn">
        <span class="btn-id">2</span>
        <span class="btn-text">🐤 Flappy Bird Game</span>
      </a>
      <!-- ===== END GAME ===== -->
    </div>
  </div>

  <script>
    /* ===== MENU ===== */
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const slideMenu = document.getElementById('slideMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    function toggleMenu() {
      slideMenu.classList.toggle('open');
      menuOverlay.classList.toggle('active');
    }
    hamburgerBtn.addEventListener('click', toggleMenu);
    closeMenuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    /* ===== TIME & WEATHER (same as home page) ===== */
    function updateTime(zone, timeId, dateId){
      const now = new Date();
      document.getElementById(timeId).textContent =
        now.toLocaleTimeString("en-GB",{hour:"numeric",minute:"2-digit",second:"2-digit",hour12:true,timeZone:zone});
      document.getElementById(dateId).textContent =
        now.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric",timeZone:zone});
    }
    setInterval(()=>{
      updateTime("Europe/London","time-uk","date-uk");
      updateTime("Asia/Karachi","time-pk","date-pk");
    },1000);

    function loadWeather(lat,lon,elId,label){
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
        .then(res=>res.json())
        .then(data=>{
          const temp=Math.round(data.current_weather.temperature);
          const code=data.current_weather.weathercode;
          let icon="☀️";
          if([1,2,3].includes(code)) icon="⛅";
          if([45,48].includes(code)) icon="🌫️";
          if([51,53,55,61,63,65,80].includes(code)) icon="🌧️";
          if([71,73,75,85].includes(code)) icon="❄️";
          if([95,96,99].includes(code)) icon="⛈️";
          document.getElementById(elId).textContent=`${label} ${icon} ${temp}°C`;
        });
    }
    loadWeather(52.57,-1.82,"weather-uk","Birmingham");
    loadWeather(33.69,73.06,"weather-pk","Islamabad");
  </script>
</body>
</html>
