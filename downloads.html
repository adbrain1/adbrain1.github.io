<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2e0249">
  <title>Get Rafay Chat</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap');

    :root {
      --bg: #2e0249;
      --card: #570a57;
      --text: #ffffff;
      --muted: #fbc7ff;
      --accent: #ffcc00;
      --border-color: #a91079;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(#a91079 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === MAIN CARD === */
    .dl-card {
      max-width: 480px;
      width: 100%;
      background: var(--card);
      border-radius: 30px;
      border: 4px solid #fff;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
      padding: 36px 24px 32px;
      animation: fadeUp 0.8s ease-out;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === APP ICON === */
    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      border: 4px solid #fff;
      box-shadow: 4px 4px 0px #000;
    }

    .app-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin: 16px 0 4px;
      text-shadow: 2px 2px 0px #000;
    }

    .app-desc {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    /* === OS BADGE === */
    .os-badge {
      display: inline-block;
      background: rgba(0,0,0,0.3);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      margin: 12px 0 0;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* === OPEN BUTTON === */
    .open-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      border: 3px solid #000;
      border-radius: 15px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 24px;
      box-shadow: 4px 4px 0px #000;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .open-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px #000;
    }

    /* === ONE-TAP INSTALL BUTTON === */
    .install-btn {
      display: none; /* shown by JS only when the phone allows install */
      width: 100%;
      padding: 18px;
      background: #34c759;
      color: #fff;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      border: 3px solid #000;
      border-radius: 15px;
      cursor: pointer;
      text-align: center;
      margin-top: 16px;
      box-shadow: 4px 4px 0px #000;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      animation: pulseInstall 1.6s ease-in-out infinite;
    }
    .install-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px #000;
    }
    @keyframes pulseInstall {
      0%, 100% { box-shadow: 4px 4px 0px #000; }
      50% { box-shadow: 4px 4px 0px #000, 0 0 0 6px rgba(52,199,89,0.25); }
    }
    .install-note {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(52,199,89,0.15);
      border: 2px solid #34c759;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    /* === SECTION HEADING === */
    .section-heading {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: left;
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* === STEPS === */
    .steps { display: flex; flex-direction: column; gap: 12px; }

    .step {
      background: rgba(0,0,0,0.25);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      text-align: left;
    }

    .step-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid #000;
      box-shadow: 2px 2px 0px #000;
    }

    .step-body { flex: 1; }

    .step-main {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .step-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.35;
    }

    .hl {
      color: var(--accent);
      font-weight: 700;
    }

    /* === VISUAL HINT === */
    .visual-hint {
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.4rem;
      border: 1px dashed var(--border-color);
    }

    .visual-hint .label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* share icon for iphone */
    .share-icon-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #007AFF;
      border-radius: 6px;
      vertical-align: middle;
    }

    .share-icon-box svg {
      width: 18px;
      height: 18px;
    }

    /* === WARNING BOX === */
    .warn-box {
      background: rgba(0,0,0,0.35);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      text-align: left;
    }

    .warn-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .warn-text {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .warn-text strong { color: var(--text); }

    /* === TROUBLE SECTION === */
    .trouble-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      padding: 8px;
    }

    .trouble-btn .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.8rem;
    }

    .trouble-btn.open .arrow { transform: rotate(180deg); }

    .trouble-content { display: none; margin-top: 10px; }
    .trouble-content.open { display: block; }

    .trouble-item {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .trouble-item strong {
      color: var(--text);
      display: block;
      margin-bottom: 3px;
      font-size: 0.95rem;
    }

    /* === FOOTER === */
    .footer {
      text-align: center;
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="dl-card">

  <!-- APP HEADER -->
  <img class="app-icon" src="https://www.rafaytravelsworldwide.com/icon-512.png" alt="Rafay Chat">
  <div class="app-name">Rafay Chat</div>
  <div class="app-desc">Family chat with Abdul Rafay</div>
  <div class="os-badge" id="osBadge">Detecting your phone…</div>

  <!-- OPEN BUTTON -->
  <a class="open-btn" href="https://www.rafaytravelsworldwide.com/chat-app.html" id="openBtn">
    Open Rafay Chat
  </a>

  <!-- ONE-TAP INSTALL (appears automatically when the phone allows it) -->
  <button class="install-btn" id="installBtn" onclick="doInstall()">⬇️ Install app</button>
  <div class="install-note" id="installNote"></div>

  <!-- ===== INSTRUCTIONS (filled by JS based on OS) ===== -->
  <div id="instructions"></div>

  <!-- TROUBLE -->
  <button class="trouble-btn" id="troubleBtn" onclick="toggleTrouble()">
    Having trouble? <span class="arrow">▼</span>
  </button>
  <div class="trouble-content" id="troubleContent"></div>

</div>

<div class="footer">Made with ❤️ by Abdul Rafay</div>

<script>
(function() {

  // ---- OS DETECTION ----
  function detectOS() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'iphone';
    if (/android/i.test(ua)) return 'android';
    if (/Macintosh/.test(ua) && 'ontouchend' in document) return 'iphone';
    return 'unknown';
  }

  const os = detectOS();
  const badge = document.getElementById('osBadge');
  const instructions = document.getElementById('instructions');
  const troubleContent = document.getElementById('troubleContent');

  // ---- SET BADGE ----
  if (os === 'android') {
    badge.textContent = '📱 Android Phone Detected';
  } else if (os === 'iphone') {
    badge.textContent = '📱 iPhone Detected';
  } else {
    badge.textContent = '📱 Phone not detected';
  }

  // ---- ANDROID INSTRUCTIONS ----
  const androidHTML = `
    <div class="section-heading">📲 How to Install</div>
    <div class="warn-box" style="margin-top:0;margin-bottom:14px;border-color:#34c759;">
      <div class="warn-title" style="color:#34c759;">✅ Easiest way</div>
      <div class="warn-text">
        If you see the green <strong>"⬇️ Install app"</strong> button above, just tap it and then tap <strong>Install</strong>. Done!<br><br>
        No green button? Follow the steps below instead.
      </div>
    </div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-main">Tap the <span class="hl">"Open Rafay Chat"</span> button above</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-main">Tap the <span class="hl">⋮ three dots</span> at the top-right of Chrome</div>
          <div class="visual-hint">
            ⋮ &nbsp;→&nbsp; <span class="label">Opens a menu</span>
          </div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-main">Tap <span class="hl">"Add to Home screen"</span> or <span class="hl">"Install app"</span></div>
          <div class="step-sub">Then tap <strong>Install</strong> to confirm</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-main">The app icon now appears on your home screen! 🎉</div>
          <div class="step-sub">Open it from there — it works like a normal app</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body">
          <div class="step-main">When asked, tap <span class="hl">"Allow"</span> for notifications</div>
          <div class="step-sub">So you get alerts when someone sends a message</div>
        </div>
      </div>
    </div>
    <div class="warn-box">
      <div class="warn-title">⚠️ Not getting notifications?</div>
      <div class="warn-text">
        Go to your phone's <strong>Settings → Apps → Rafay Chat</strong> and make sure notifications are <strong>ON</strong>.<br><br>
        Also check that <strong>Battery Saver</strong> is not blocking the app.
      </div>
    </div>
  `;

  // ---- IPHONE INSTRUCTIONS ----
  const iphoneHTML = `
    <div class="section-heading">📲 How to Install</div>
    <div class="warn-box" style="margin-top:0; margin-bottom:14px; border-color:#ff6b6b;">
      <div class="warn-title" style="color:#ff6b6b;">📌 You must use Safari</div>
      <div class="warn-text">
        This only works in <strong>Safari</strong>. If the page opens in Chrome or another browser, close it and open it in <strong>Safari</strong> instead.
      </div>
    </div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-main">Tap the <span class="hl">"Open Rafay Chat"</span> button above</div>
          <div class="step-sub">Make sure it opens in <strong>Safari</strong></div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-main">Tap the <span class="hl">Share button</span> at the bottom of the screen</div>
          <div class="visual-hint">
            <span class="share-icon-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
            </span>
            &nbsp;<span class="label">Square with an arrow pointing up</span>
          </div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-main">Scroll down and tap <span class="hl">"Add to Home Screen"</span></div>
          <div class="step-sub">Then tap <strong>Add</strong> at the top right</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-main">The app icon now appears on your home screen! 🎉</div>
          <div class="step-sub">Open it from there — it works like a normal app</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body">
          <div class="step-main">When asked, tap <span class="hl">"Allow"</span> for notifications</div>
          <div class="step-sub">So you get alerts when someone sends a message</div>
        </div>
      </div>
    </div>
    <div class="warn-box">
      <div class="warn-title">⚠️ Not getting notifications?</div>
      <div class="warn-text">
        Notifications only work when you open the app <strong>from the home screen icon</strong> (not from Safari).<br><br>
        If they're still not working, go to <strong>Settings → Rafay Chat → Notifications</strong> and turn them <strong>ON</strong>.
      </div>
    </div>
  `;

  // ---- UNKNOWN OS ----
  const unknownHTML = `
    <div class="section-heading">📲 How to Install</div>
    <div class="warn-box" style="margin-top:0; margin-bottom:14px;">
      <div class="warn-title">📱 Open this page on your phone</div>
      <div class="warn-text">
        This page needs to be opened on your <strong>Android</strong> or <strong>iPhone</strong> to show you the right steps. Please open this link on your phone.
      </div>
    </div>
  `;

  // ---- SHOW THE RIGHT INSTRUCTIONS ----
  if (os === 'android') {
    instructions.innerHTML = androidHTML;
  } else if (os === 'iphone') {
    instructions.innerHTML = iphoneHTML;
  } else {
    instructions.innerHTML = unknownHTML;
  }

  // ---- TROUBLE ITEMS (OS specific) ----
  const androidTrouble = `
    <div class="trouble-item">
      <strong>I don't see "Add to Home screen"</strong>
      Make sure you opened the app in <strong>Chrome</strong>. Other browsers might not show this option.
    </div>
    <div class="trouble-item">
      <strong>I'm not getting notifications</strong>
      Open the app from the home screen icon, not from the browser. Then check Settings → Apps → Rafay Chat → Notifications → make sure they're ON.
    </div>
    <div class="trouble-item">
      <strong>The app won't load or looks broken</strong>
      Close the app completely and re-open it. If that doesn't work, delete the icon from your home screen and follow the steps again.
    </div>
  `;

  const iphoneTrouble = `
    <div class="trouble-item">
      <strong>I don't see "Add to Home Screen"</strong>
      Make sure you're using <strong>Safari</strong>. This option does not appear in Chrome or other browsers on iPhone.
    </div>
    <div class="trouble-item">
      <strong>I'm not getting notifications</strong>
      You must open the app from the <strong>home screen icon</strong>. Notifications do not work when opening from Safari. Also check Settings → Rafay Chat → Notifications.
    </div>
    <div class="trouble-item">
      <strong>The app won't load or looks broken</strong>
      Close the app completely and re-open it. If that doesn't work, delete the icon from your home screen and follow the steps again using Safari.
    </div>
  `;

  if (os === 'android') {
    troubleContent.innerHTML = androidTrouble;
  } else if (os === 'iphone') {
    troubleContent.innerHTML = iphoneTrouble;
  } else {
    document.getElementById('troubleBtn').style.display = 'none';
  }

})();

// ───────── ONE-TAP INSTALL ─────────
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
const installNote = document.getElementById('installNote');

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

// Chrome (Android) fires this when the app can be installed. We capture it and
// reveal our big green button instead of making kids hunt through the menu.
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) installBtn.style.display = 'block';
});

async function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  try { await deferredPrompt.userChoice; } catch (e) {}
  deferredPrompt = null;
  if (installBtn) installBtn.style.display = 'none';
}

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  if (installBtn) installBtn.style.display = 'none';
  if (installNote) {
    installNote.textContent = '🎉 Installed! Open “Rafay Chat” from your home screen.';
    installNote.style.display = 'block';
  }
});

// If it's already installed and opened from the home screen, say so.
if (isStandalone() && installNote) {
  installNote.textContent = '✅ App is already installed. You can open it from your home screen.';
  installNote.style.display = 'block';
}

// Register the service worker so the page qualifies as an installable app.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

function toggleTrouble() {
  document.getElementById('troubleBtn').classList.toggle('open');
  document.getElementById('troubleContent').classList.toggle('open');
}
</script>

</body>
</html>
