<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rafay Chat</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2e0249">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─────────────────────────────────────────────────────────────────
       Theme tokens. Light values are the default; <html data-theme="dark">
       swaps to the dark palette via the same variable names.
       ───────────────────────────────────────────────────────────────── */
    :root {
      --brand-primary: #2e0249;
      --brand-primary-dark: #1a0029;
      --brand-accent: #9d4edd;
      --brand-accent-soft: #c77dff;
      --gold: #ffcc00;

      --bg-app: #ece5dd;
      --bg-chat: #efeae2;
      --bg-header: #2e0249;
      --bg-input: #ffffff;
      --bg-bubble-mine: #d9c4f0;
      --bg-bubble-other: #ffffff;
      --bg-panel: #ffffff;
      --bg-overlay: rgba(0, 0, 0, 0.5);
      --bg-reply-mine: rgba(46, 2, 73, 0.08);
      --bg-reply-other: rgba(46, 2, 73, 0.05);

      --text-primary: #111111;
      --text-secondary: #54656f;
      --text-muted: #8696a0;
      --text-on-brand: #ffffff;
      --text-link: #027eb5;

      --border-soft: rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 1px 0.5px rgba(0, 0, 0, 0.13);
      --shadow-md: 0 2px 10px rgba(0, 0, 0, 0.15);

      --header-h: 56px;
      --input-min-h: 52px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html[data-theme="dark"] {
      --bg-app: #0b141a;
      --bg-chat: #0b141a;
      --bg-header: #1a0029;
      --bg-input: #1f2c34;
      --bg-bubble-mine: #5b2178;
      --bg-bubble-other: #202c33;
      --bg-panel: #233138;
      --bg-overlay: rgba(0, 0, 0, 0.7);
      --bg-reply-mine: rgba(255, 255, 255, 0.06);
      --bg-reply-other: rgba(255, 255, 255, 0.04);

      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --text-muted: #6b7c85;
      --text-on-brand: #ffffff;

      --border-soft: rgba(255, 255, 255, 0.08);
    }

    /* ─── Reset ─── */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      background: var(--bg-app);
      overflow: hidden;
      overscroll-behavior: none;
    }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    input, textarea { font-family: inherit; color: var(--text-primary); }
    a { color: var(--text-link); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 3px; }

    /* ─── Login screen ─── */
    #loginScreen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--brand-primary) 0%, var(--brand-accent) 100%);
      color: white;
      padding: 24px;
      z-index: 100;
    }
    #loginScreen .logo {
      width: 96px; height: 96px;
      border-radius: 28px;
      background: white;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    #loginScreen .logo img { width: 80%; height: 80%; object-fit: contain; }
    #loginScreen h1 {
      font-size: 26px; font-weight: 700;
      margin: 0 0 8px 0; text-align: center;
    }
    #loginScreen p {
      margin: 0 0 32px 0; opacity: 0.85; font-size: 15px; text-align: center;
    }
    #loginScreen .name-box {
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #loginScreen input {
      width: 100%; padding: 16px 18px;
      font-size: 16px;
      border: 0; border-radius: 14px;
      background: rgba(255,255,255,0.95);
      color: #111;
      outline: none;
    }
    #loginScreen button {
      width: 100%; padding: 16px;
      font-size: 16px; font-weight: 600;
      background: var(--gold); color: #1a0029;
      border-radius: 14px;
    }
    #loginScreen button:active { transform: scale(0.98); }

    /* ─── App layout ─── */
    #appScreen {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      background: var(--bg-chat);
    }
    #appScreen.show { display: flex; }

    /* ─── Header ─── */
    .top-header {
      flex: 0 0 auto;
      background: var(--bg-header);
      color: var(--text-on-brand);
      padding: var(--safe-top) 0 0 0;
      box-shadow: var(--shadow-md);
      z-index: 10;
    }
    .header-row {
      display: flex; align-items: center;
      height: var(--header-h);
      padding: 0 8px 0 12px;
    }
    .header-id {
      flex: 1; display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
      min-width: 0;
    }
    .header-id:active { background: rgba(255,255,255,0.08); }
    .header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .header-avatar img { width: 85%; height: 85%; object-fit: contain; }
    .header-text { min-width: 0; }
    .header-title { font-size: 17px; font-weight: 600; line-height: 1.2; }
    .header-subtitle { font-size: 12px; opacity: 0.85; line-height: 1.2; }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      color: var(--text-on-brand);
      font-size: 20px;
    }
    .icon-btn:active { background: rgba(255,255,255,0.12); }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

    /* ─── Search bar ─── */
    .search-bar {
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bg-header);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .search-bar.show { display: flex; }
    .search-bar input {
      flex: 1; padding: 10px 14px;
      border-radius: 22px; border: 0;
      background: rgba(255,255,255,0.95); color: #111;
      font-size: 15px; outline: none;
    }
    .search-bar .icon-btn { color: white; }
    .search-stats { font-size: 12px; color: white; opacity: 0.8; padding: 0 4px; min-width: 50px; text-align: center;}

    /* ─── Messages area ─── */
    #messagesContainer {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px 8px 16px 8px;
      background: var(--bg-chat);
      background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent);
    }
    html[data-theme="dark"] #messagesContainer {
      background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02), transparent);
    }

    .day-divider {
      text-align: center; margin: 16px 0 8px;
    }
    .day-divider span {
      display: inline-block;
      background: var(--bg-bubble-other);
      color: var(--text-secondary);
      font-size: 12px; font-weight: 500;
      padding: 4px 12px; border-radius: 12px;
      box-shadow: var(--shadow-sm);
    }

    /* ─── Message bubble ─── */
    .msg-row {
      display: flex; gap: 6px; margin-bottom: 4px;
      max-width: 100%;
      animation: msg-pop 0.18s ease-out;
    }
    @keyframes msg-pop {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.other { justify-content: flex-start; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; align-self: flex-end;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      color: white; overflow: hidden;
      visibility: hidden;
    }
    .msg-avatar.show { visibility: visible; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-bubble {
      max-width: 78%;
      min-width: 60px;
      padding: 6px 10px 22px 10px;
      border-radius: 8px;
      position: relative;
      box-shadow: var(--shadow-sm);
      word-wrap: break-word;
      overflow-wrap: break-word;
      user-select: none;
      -webkit-user-select: none;
    }
    .msg-row.mine .msg-bubble {
      background: var(--bg-bubble-mine);
      border-top-right-radius: 2px;
    }
    .msg-row.other .msg-bubble {
      background: var(--bg-bubble-other);
      border-top-left-radius: 2px;
    }
    .msg-sender {
      font-size: 13px; font-weight: 600;
      margin-bottom: 2px;
      color: var(--brand-accent);
    }
    html[data-theme="dark"] .msg-sender { color: var(--brand-accent-soft); }

    .msg-text {
      font-size: 14.5px; line-height: 1.4;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-meta {
      position: absolute; bottom: 4px; right: 8px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
    }
    .msg-meta .edited { font-style: italic; opacity: 0.7; font-size: 10px; }

    /* ─── Reply preview inside a message ─── */
    .msg-reply-quote {
      display: block;
      padding: 6px 8px;
      margin: -2px -2px 6px -2px;
      border-radius: 6px;
      border-left: 3px solid var(--brand-accent);
      font-size: 13px;
      cursor: pointer;
    }
    .msg-row.mine .msg-reply-quote { background: var(--bg-reply-mine); }
    .msg-row.other .msg-reply-quote { background: var(--bg-reply-other); }
    .msg-reply-quote .qname { font-weight: 600; color: var(--brand-accent); font-size: 12px; display: block; }
    .msg-reply-quote .qtext { color: var(--text-secondary); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── Reactions chip ─── */
    .msg-reactions {
      position: absolute; bottom: -10px;
      display: flex; gap: 2px;
      background: var(--bg-bubble-other);
      border-radius: 12px;
      padding: 2px 6px;
      box-shadow: var(--shadow-sm);
      font-size: 13px;
      z-index: 1;
    }
    .msg-row.mine .msg-reactions { right: 8px; }
    .msg-row.other .msg-reactions { left: 8px; }
    .msg-reactions .count { font-size: 11px; color: var(--text-secondary); margin-left: 2px; }
    .msg-reactions:active { transform: scale(0.96); }

    .msg-row.has-reactions { margin-bottom: 14px; }

    /* ─── Media in messages ─── */
    .msg-image {
      max-width: 240px; max-height: 320px;
      border-radius: 6px; display: block;
      margin-bottom: 4px;
    }
    .msg-voice {
      display: flex; align-items: center; gap: 8px;
      min-width: 180px;
    }
    .msg-voice audio {
      width: 200px; height: 32px;
    }
    .msg-file {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-link);
    }
    html[data-theme="dark"] .msg-file { background: rgba(255,255,255,0.06); }
    .msg-file .file-icon { font-size: 20px; }
    .msg-file .file-name { font-size: 13px; word-break: break-all; }

    /* ─── "Seen by" line ─── */
    .seen-by {
      font-size: 10.5px; color: var(--text-muted);
      padding: 0 12px 2px;
      text-align: right;
      margin-top: -2px;
      margin-bottom: 4px;
    }
    .msg-row.other + .seen-by { display: none; }

    /* ─── Reply preview above input ─── */
    .reply-preview {
      display: none;
      padding: 8px 12px;
      background: var(--bg-bubble-other);
      border-top: 1px solid var(--border-soft);
      border-left: 4px solid var(--brand-accent);
      align-items: center; gap: 10px;
    }
    .reply-preview.show { display: flex; }
    .reply-preview .rp-body { flex: 1; min-width: 0; }
    .reply-preview .rp-name { font-size: 13px; font-weight: 600; color: var(--brand-accent); }
    .reply-preview .rp-text { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reply-preview .rp-cancel { color: var(--text-secondary); padding: 4px; }

    /* ─── Edit banner above input ─── */
    .edit-banner {
      display: none;
      padding: 8px 12px;
      background: rgba(255,204,0,0.18);
      color: var(--text-primary);
      font-size: 13px;
      border-top: 1px solid var(--border-soft);
      align-items: center; gap: 8px;
    }
    .edit-banner.show { display: flex; }
    .edit-banner .rp-cancel { margin-left: auto; padding: 4px; }

    /* ─── Typing indicator ─── */
    .typing-bar {
      padding: 0 14px 4px;
      font-size: 12px; color: var(--text-secondary);
      font-style: italic; min-height: 18px;
    }

    /* ─── Input area ─── */
    .input-wrap {
      flex: 0 0 auto;
      background: var(--bg-app);
      padding: 6px 6px calc(6px + var(--safe-bottom)) 6px;
      border-top: 1px solid var(--border-soft);
    }
    .staging-area {
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 10px; margin-bottom: 6px;
      background: var(--bg-bubble-other);
      border-radius: 12px;
      font-size: 13px;
    }
    .staging-area.show { display: flex; }
    .staging-area .preview-img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
    .staging-area .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .input-row {
      display: flex; align-items: flex-end; gap: 4px;
    }
    .input-row .ic-input {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .input-row .ic-input:active { background: rgba(0,0,0,0.05); }
    html[data-theme="dark"] .input-row .ic-input:active { background: rgba(255,255,255,0.06); }
    .input-row .ic-input svg { width: 22px; height: 22px; fill: currentColor; }
    #chatInput {
      flex: 1;
      min-height: 40px; max-height: 140px;
      padding: 10px 14px;
      border-radius: 22px;
      border: 0;
      background: var(--bg-input);
      font-size: 15px; line-height: 1.35;
      resize: none; outline: none;
      box-shadow: var(--shadow-sm);
    }
    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--brand-accent);
      color: white;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn svg { width: 22px; height: 22px; fill: currentColor; }
    #sendBtn:active { transform: scale(0.94); }

    /* ─── Emoji bar ─── */
    .emoji-bar {
      display: none; flex-wrap: wrap;
      gap: 4px; padding: 6px 4px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.2s ease;
    }
    .emoji-bar.show { display: flex; max-height: 200px; }
    .emoji-bar button {
      font-size: 22px;
      padding: 6px 10px;
    }

    /* ─── Slide panels (online users / settings) ─── */
    .panel-backdrop {
      position: fixed; inset: 0;
      background: var(--bg-overlay);
      z-index: 20; opacity: 0;
      pointer-events: none; transition: opacity 0.2s;
    }
    .panel-backdrop.show { opacity: 1; pointer-events: auto; }

    .side-panel {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 85%; max-width: 340px;
      background: var(--bg-panel);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 21;
      display: flex; flex-direction: column;
      padding-top: var(--safe-top);
    }
    .side-panel.show { transform: translateX(0); }
    .side-panel .ph {
      background: var(--bg-header); color: var(--text-on-brand);
      padding: 12px 16px; height: var(--header-h);
      display: flex; align-items: center; gap: 12px;
    }
    .side-panel .ph-title { font-weight: 600; }
    .side-panel .pbody { flex: 1; overflow-y: auto; padding: 12px; }

    .top-panel {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--bg-panel);
      transform: translateY(-100%);
      transition: transform 0.25s ease;
      z-index: 21; max-height: 70vh; overflow-y: auto;
      padding-top: var(--safe-top);
      box-shadow: var(--shadow-md);
    }
    .top-panel.show { transform: translateY(0); }
    .top-panel .ph {
      background: var(--bg-header); color: var(--text-on-brand);
      padding: 0 12px 0 16px; height: var(--header-h);
      display: flex; align-items: center; gap: 12px;
      padding-top: var(--safe-top);
    }
    .top-panel .ph-title { font-weight: 600; flex: 1; }

    .user-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .user-row .ua {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--brand-accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 16px; overflow: hidden; flex-shrink: 0;
    }
    .user-row .ua img { width: 100%; height: 100%; object-fit: cover; }
    .user-row .un { font-weight: 500; flex: 1; }
    .user-row .ud { font-size: 12px; color: var(--text-muted); }
    .user-row .online-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #4caf50; flex-shrink: 0;
    }

    /* ─── Settings panel ─── */
    .settings-section {
      padding: 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .settings-section h3 { margin: 0 0 12px 0; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .my-profile {
      display: flex; align-items: center; gap: 14px;
    }
    .my-profile .ua {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--brand-accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 24px; overflow: hidden; flex-shrink: 0;
      cursor: pointer; position: relative;
    }
    .my-profile .ua img { width: 100%; height: 100%; object-fit: cover; }
    .my-profile .ua .cam {
      position: absolute; bottom: -2px; right: -2px;
      width: 22px; height: 22px;
      background: var(--brand-accent-soft); border: 2px solid var(--bg-panel);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .my-profile .me-name { font-weight: 600; font-size: 17px; }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
    }
    .settings-row .lbl { flex: 1; font-size: 15px; }
    .toggle {
      position: relative; width: 46px; height: 26px;
      background: #ccc; border-radius: 13px;
      transition: background 0.2s;
      cursor: pointer; flex-shrink: 0;
    }
    .toggle.on { background: var(--brand-accent); }
    .toggle::after {
      content: ''; position: absolute;
      width: 22px; height: 22px;
      top: 2px; left: 2px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(20px); }

    /* ─── Action sheet (long-press menu) ─── */
    .action-sheet {
      position: fixed; inset: 0;
      background: var(--bg-overlay);
      display: none; align-items: flex-end;
      z-index: 30;
    }
    .action-sheet.show { display: flex; animation: fadein 0.15s; }
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
    .action-sheet .sheet {
      background: var(--bg-panel);
      border-radius: 16px 16px 0 0;
      width: 100%;
      padding: 8px 0 calc(8px + var(--safe-bottom));
      animation: slideup 0.2s ease;
    }
    @keyframes slideup { from { transform: translateY(100%) } to { transform: translateY(0) } }
    .reactions-row {
      display: flex; justify-content: space-around;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-soft);
    }
    .reactions-row button {
      font-size: 28px; padding: 6px 10px;
      border-radius: 50%;
    }
    .reactions-row button:active { background: rgba(0,0,0,0.06); transform: scale(1.15); }
    .action-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 20px; font-size: 16px;
      width: 100%; text-align: left;
    }
    .action-item:active { background: rgba(0,0,0,0.04); }
    html[data-theme="dark"] .action-item:active { background: rgba(255,255,255,0.04); }
    .action-item svg { width: 22px; height: 22px; fill: currentColor; color: var(--text-secondary); }
    .action-item.danger { color: #e53935; }

    /* ─── Recording overlay ─── */
    .rec-overlay {
      position: fixed; bottom: 70px; left: 12px; right: 60px;
      background: var(--bg-panel); padding: 10px 14px;
      border-radius: 22px; box-shadow: var(--shadow-md);
      display: none; align-items: center; gap: 10px;
      z-index: 15;
    }
    .rec-overlay.show { display: flex; }
    .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: #e53935; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .rec-text { flex: 1; font-size: 14px; color: var(--text-secondary); }

    /* ─── Search highlight ─── */
    mark { background: #ffeb3b; color: #000; padding: 0 2px; border-radius: 2px; }

    /* ─── Hidden helpers ─── */
    .hidden { display: none !important; }

    /* ─── Priority bar (sticky Abdul Rafay last seen) ─── */
    .priority-bar {
      flex: 0 0 auto;
      background: linear-gradient(135deg, #2e0249, #4a0e78);
      color: #e0e0e0;
      padding: 6px 12px;
      font-size: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--brand-accent);
    }
    .priority-bar.show { display: flex; }
    html[data-theme="dark"] .priority-bar { background: linear-gradient(135deg, #1a0029, #2e0249); }
    .priority-bar .star { color: #ffd700; }
    .priority-bar .pname { font-weight: 600; color: #ffd700; }
    .priority-bar .pstatus { color: #4caf50; font-weight: 600; }
    .priority-bar .pseen { opacity: 0.85; }

    /* ─── Image lightbox ─── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: fadein 0.15s;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      user-select: none; -webkit-user-select: none;
    }
    .lightbox .lb-close {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      right: 12px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      color: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .lightbox .lb-download {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      right: 16px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      color: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox .lb-download svg { width: 22px; height: 22px; fill: currentColor; }

    /* Make chat images obviously clickable */
    .msg-image { cursor: pointer; transition: transform 0.1s; }
    .msg-image:active { transform: scale(0.98); }

    /* ─── Voice button recording state ─── */
    #voiceBtn.recording {
      background: #e53935;
      color: white;
      animation: pulse-rec 1.2s infinite;
    }
    @keyframes pulse-rec {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
      50%      { box-shadow: 0 0 0 10px rgba(229, 57, 53, 0); }
    }

    /* ─── Voice staging area player ─── */
    .staging-area audio { height: 36px; flex: 1; max-width: 220px; }

    /* ─── Seen-by line (expandable) ─── */
    .seen-by {
      cursor: pointer;
    }
    .seen-by:active { opacity: 0.6; }
    .seen-by-expanded {
      display: block;
      margin-top: 2px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      color: var(--text-secondary);
    }
    html[data-theme="dark"] .seen-by-expanded { background: rgba(255,255,255,0.04); }
    .seen-by-expanded .sb-line { font-size: 11px; line-height: 1.5; }
    .seen-by-expanded .sb-name { font-weight: 600; }
  </style>
</head>
<body>

  <!-- ─── Login screen ─── -->
  <div id="loginScreen">
    <div class="logo"><img src="/icon-512.png" alt="Rafay Chat"></div>
    <h1>Rafay Chat</h1>

  <!-- ─── Main app ─── -->
  <div id="appScreen">

    <header class="top-header">
      <div class="header-row">
        <button class="icon-btn" id="menuBtn" onclick="toggleSettings(true)" title="Menu">

          </button>

            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>

        <button class="icon-btn" onclick="searchNext()" title="Next">▼</button>

    <!-- Priority bar: always-visible Abdul Rafay last-seen indicator -->

    <!-- Input area -->

      <div class="input-row">

          <svg viewBox="0 0 24 24"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-3.5-9c.828 0 1.5-.672 1.5-1.5S9.328 8 8.5 8 7 8.672 7 9.5 7.672 11 8.5 11zm7 0c.828 0 1.5-.672 1.5-1.5S16.328 8 15.5 8 14 8.672 14 9.5s.672 1.5 1.5 1.5zM12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>

  <!-- ─── Online users panel (slides from top) ─── -->

  <!-- ─── Action sheet for long-press ─── -->
  <div class="action-sheet" id="actionSheet" onclick="if(event.target===this)hideActionSheet()">
    <div class="sheet">

        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1.003 1.003 0 0 0 0-1.42L18.37 3.29a1.003 1.003 0 0 0-1.42 0L15 5.25l3.75 3.75 1.96-1.96z"/></svg>

  <!-- Image lightbox -->
  <div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">

    <img id="lightboxImg" alt="">
    <a class="lb-download" id="lbDownload" download title="Download">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>

  <!-- Audio for new-message ping -->
  <audio id="pingSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
  </audio>

  <!-- ─── Firebase + Messaging SDKs ─── -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>

  <script>
    // ════════════════════════════════════════════════════════════════════
    //  Firebase config (shared with chat.html and Cloud Functions)
    // ════════════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyDyULp4egjGIXoR9t0v0_KF8Cf4_2VfdqE",
      authDomain: "abdulrafaychat.firebaseapp.com",
      projectId: "abdulrafaychat",
      storageBucket: "abdulrafaychat.firebasestorage.app",
      messagingSenderId: "1078346470566",
      appId: "1:1078346470566:web:489a0d85d89216e5e39067",
      databaseURL: "https://abdulrafaychat-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const messaging = firebase.messaging.isSupported() ? firebase.messaging() : null;

    // VAPID key — keep your existing one
    const VAPID_PUBLIC_KEY = "BNb1gmTeRE1wvEH3bw39fs-poh0Gv-Z5pjIkK_1IlCw3esgezMldZnatdVSgBXo909uWoDg5Df5OMWyiu0ibzZg";

    // ════════════════════════════════════════════════════════════════════
    //  Globals
    // ════════════════════════════════════════════════════════════════════
    const REACTION_EMOJIS = ["👍","❤️","😂","😮","😢","🙏"];
    const QUICK_EMOJIS = ["😀","😂","😍","😎","🥳","🤔","😢","😡","👍","👎","❤️","🔥","🎉","🙏","💯","😴","🤗","😘","🙌","✨"];
    const MAX_FILE_SIZE_MB = 25;
    const PROFILE_PIC_MAX_SIZE = 200; // px, square

    let currentUserName = null;
    let isAdmin = false;
    let allMessages = {};                 // key -> message data
    let onlineUsers = {};                 // userName -> true
    let profilePics = {};                 // userName -> base64 dataURL
    let typingUsers = {};                 // userName -> true
    let editingMessageKey = null;
    let replyingTo = null;                // { msgId, user, snippet }
    let stagedFile = null;
    let stagedVoiceBlob = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recording = false;
    let activeSelectedMsgId = null;       // for action sheet
    let searchMatches = [];               // array of msgIds matching current search
    let searchIdx = -1;
    let darkMode = false;
    let lastSeenMap = {};                 // userName -> timestamp ms
    let initialLoadDone = false;          // suppress sounds while loading

    // ════════════════════════════════════════════════════════════════════
    //  Name helpers
    // ════════════════════════════════════════════════════════════════════

    /** Matches "abdul" or "rafay" anywhere — same logic as Cloud Function */
    function isAbdulRafayName(name) {
      if (!name) return false;
      const norm = String(name).toLowerCase().replace(/\s+/g, "");
      return norm.includes("abdul") || norm.includes("rafay");
    }

    // ════════════════════════════════════════════════════════════════════
    //  Theme
    // ════════════════════════════════════════════════════════════════════
    function applyTheme() {
      document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
      document.querySelector('meta[name="theme-color"]').setAttribute("content", darkMode ? "#1a0029" : "#2e0249");
      document.getElementById("darkToggle").classList.toggle("on", darkMode);
    }
    function toggleTheme() {
      darkMode = !darkMode;
      localStorage.setItem("rc_dark", darkMode ? "1" : "0");
      applyTheme();
    }
    darkMode = localStorage.getItem("rc_dark") === "1";
    applyTheme();

    // ════════════════════════════════════════════════════════════════════
    //  Login & Push notifications
    // ════════════════════════════════════════════════════════════════════
    async function setupPushNotifications(userName) {
      if (!messaging || !("Notification" in window)) return;
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return;
        const token = await messaging.getToken({ vapidKey: VAPID_PUBLIC_KEY });
        if (!token) return;
        await db.ref(`fcm_tokens/${userName}/${token}`).set(true);
        messaging.onMessage((payload) => {
          // Foreground push — keep quiet, app is already open
          console.log("Foreground push:", payload);
        });
      } catch (e) { console.log("Push setup failed:", e); }
    }

    function startChat() {
      const name = document.getElementById("userName").value.trim();
      if (!name) return alert("Please enter your name");
      currentUserName = name;
      isAdmin = name.toLowerCase() === "adnan";
      localStorage.setItem("rc_name", name);

      // Tell the Cloud Function someone logged in (fires push to others)
      db.ref("login_events").push({
        user: name,
        ts: firebase.database.ServerValue.TIMESTAMP
      }).catch(() => {});

      // Push notification subscribe
      setupPushNotifications(name);

      // UI transition
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").classList.add("show");

      // My avatar bits
      document.getElementById("myAvatarInitials").innerText = initialsOf(name);
      document.getElementById("myDisplayName").innerText = name;

      // Presence
      const onlineRef = db.ref("online_users/" + name);
      const lastSeenRef = db.ref("last_seen/" + name);
      db.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true) {
          onlineRef.set(true);
          onlineRef.onDisconnect().remove();
          lastSeenRef.remove();
          lastSeenRef.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
        }
      });

      // Listen to data
      listenToMessages();
      listenToOnlineUsers();
      listenToProfiles();
      listenToTyping();
      listenToLastSeen();

      // Auto-keep-alive every 4 mins
      setInterval(() => db.ref(`online_users/${currentUserName}`).set(true), 240000);
    }

    // ════════════════════════════════════════════════════════════════════
    //  Profile photos (Base64 in /profiles/{user}/photo)
    // ════════════════════════════════════════════════════════════════════
    function listenToProfiles() {
      db.ref("profiles").on("value", (snap) => {
        profilePics = {};
        const all = snap.val() || {};
        for (const [user, val] of Object.entries(all)) {
          if (val && val.photo) profilePics[user] = val.photo;
        }
        refreshAvatarsInUI();
      });
    }

    function refreshAvatarsInUI() {
      // My avatar
      const myAv = document.getElementById("myAvatar");
      const initials = myAv.querySelector("#myAvatarInitials");
      if (profilePics[currentUserName]) {
        // remove existing img then re-add
        myAv.querySelectorAll("img.pp").forEach(n => n.remove());
        const img = document.createElement("img");
        img.className = "pp";
        img.src = profilePics[currentUserName];
        myAv.insertBefore(img, initials);
        if (initials) initials.style.display = "none";
      } else {
        myAv.querySelectorAll("img.pp").forEach(n => n.remove());
        if (initials) initials.style.display = "";
      }
      // Update all message avatars + online list
      document.querySelectorAll("[data-user-avatar]").forEach((el) => {
        const u = el.getAttribute("data-user-avatar");
        renderAvatarInto(el, u);
      });
      renderOnlineUsersList();
    }

    function uploadProfilePhoto(input) {
      const file = input.files[0]; if (!file) return;
      if (!file.type.startsWith("image/")) return alert("Please pick an image.");
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          // Resize/crop to square PROFILE_PIC_MAX_SIZE
          const size = PROFILE_PIC_MAX_SIZE;
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          const min = Math.min(img.width, img.height);
          const sx = (img.width - min) / 2;
          const sy = (img.height - min) / 2;
          ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
          db.ref(`profiles/${currentUserName}/photo`).set(dataUrl)
            .then(() => { /* listener will refresh */ })
            .catch((err) => alert("Failed to save photo: " + err.message));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      input.value = "";
    }

    function initialsOf(name) {
      if (!name) return "?";
      const parts = name.trim().split(/\s+/);
      return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
    }

    function colorFor(name) {
      // Stable HSL color from name hash
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return `hsl(${h % 360}, 50%, 50%)`;
    }

    function renderAvatarInto(el, user) {
      el.innerHTML = "";
      if (profilePics[user]) {
        const img = document.createElement("img");
        img.src = profilePics[user];
        el.appendChild(img);
        el.style.background = "transparent";
      } else {
        el.innerText = initialsOf(user);
        el.style.background = colorFor(user);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  Online users
    // ════════════════════════════════════════════════════════════════════
    function listenToOnlineUsers() {
      db.ref("online_users").on("value", (snap) => {
        onlineUsers = snap.val() || {};
        document.getElementById("onlineCountLabel").innerText =
          `${Object.keys(onlineUsers).length} online`;
        renderOnlineUsersList();
        renderPriorityBar(); // online status affects priority bar text
      });
    }

    // ════════════════════════════════════════════════════════════════════
    //  Last seen + Priority bar (Abdul Rafay always visible at top)
    // ════════════════════════════════════════════════════════════════════
    function listenToLastSeen() {
      db.ref("last_seen").on("value", (snap) => {
        lastSeenMap = snap.val() || {};
        renderPriorityBar();
      });
    }

    function formatRelative(ts) {
      if (!ts) return "";
      const now = Date.now();
      const diff = now - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins} min ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hour${hrs > 1 ? "s" : ""} ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days} day${days > 1 ? "s" : ""} ago`;
      return new Date(ts).toLocaleDateString();
    }

    function renderPriorityBar() {
      // Find ANY user matching abdul/rafay
      const bar = document.getElementById("priorityBar");
      const nameEl = document.getElementById("pbName");
      const statusEl = document.getElementById("pbStatus");

      // Collect all known Abdul Rafay variants (online + last_seen + my own if me)
      const candidates = new Set();
      Object.keys(onlineUsers).forEach(u => { if (isAbdulRafayName(u)) candidates.add(u); });
      Object.keys(lastSeenMap).forEach(u => { if (isAbdulRafayName(u)) candidates.add(u); });

      if (candidates.size === 0) {
        bar.classList.remove("show");
        return;
      }

      // Pick the most recent / online one
      let chosenName = null;
      let chosenIsOnline = false;
      let chosenLastSeen = 0;
      for (const name of candidates) {
        const isOnline = !!onlineUsers[name];
        const lastSeen = lastSeenMap[name] || 0;
        if (isOnline && !chosenIsOnline) {
          chosenName = name; chosenIsOnline = true; chosenLastSeen = 0;
        } else if (!chosenIsOnline && lastSeen > chosenLastSeen) {
          chosenName = name; chosenLastSeen = lastSeen;
        }
      }
      if (!chosenName) { bar.classList.remove("show"); return; }

      nameEl.innerText = chosenName;
      if (chosenIsOnline) {
        statusEl.innerHTML = `is <span class="pstatus">online</span> now`;
      } else if (chosenLastSeen) {
        statusEl.innerHTML = `<span class="pseen">last seen ${formatRelative(chosenLastSeen)}</span>`;
      } else {
        statusEl.innerHTML = `<span class="pseen">offline</span>`;
      }
      bar.classList.add("show");
    }

    // Refresh the relative-time text on the priority bar every minute
    setInterval(renderPriorityBar, 60000);

    function renderOnlineUsersList() {
      const list = document.getElementById("onlineUsersList");
      list.innerHTML = "";
      const sorted = Object.keys(onlineUsers).sort();
      if (sorted.length === 0) {
        list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary)">No one is online right now.</div>`;
        return;
      }
      sorted.forEach((u) => {
        const row = document.createElement("div");
        row.className = "user-row";
        const av = document.createElement("div");
        av.className = "ua"; av.setAttribute("data-user-avatar", u);
        renderAvatarInto(av, u);
        const name = document.createElement("div");
        name.className = "un"; name.innerText = u + (u === currentUserName ? " (You)" : "");
        const dot = document.createElement("div");
        dot.className = "online-dot";
        row.appendChild(av); row.appendChild(name); row.appendChild(dot);
        list.appendChild(row);
      });
    }

    // ════════════════════════════════════════════════════════════════════
    //  Typing indicator
    // ════════════════════════════════════════════════════════════════════
    let typingTimeout = null;
    function updateTypingStatus(status) {
      if (!currentUserName) return;
      db.ref(`typing_status/${currentUserName}`).set(status === "typing");
      if (status === "typing") {
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => updateTypingStatus("stopped"), 2500);
      }
    }
    function listenToTyping() {
      db.ref("typing_status").on("value", (snap) => {
        const t = snap.val() || {};
        delete t[currentUserName];
        typingUsers = {};
        for (const [user, isTyping] of Object.entries(t)) {
          if (isTyping) typingUsers[user] = true;
        }
        const bar = document.getElementById("typingBar");
        const names = Object.keys(typingUsers);
        bar.innerText = names.length === 0 ? "" :
          names.length === 1 ? `${names[0]} is typing…` :
          `${names.join(", ")} are typing…`;
      });
    }

    // ════════════════════════════════════════════════════════════════════
    //  Messages — load, render, send
    // ════════════════════════════════════════════════════════════════════
    function listenToMessages() {
      // Wait for initial batch to finish before treating new messages as "incoming"
      db.ref("messages").limitToLast(1000).once("value", () => {
        // Defer flag set so child_added has fired for all initial messages
        setTimeout(() => {
          initialLoadDone = true;
          scrollToBottom();
        }, 300);
      });

      // Load last 1000 (search scope per Adnan's decision)
      db.ref("messages").limitToLast(1000).on("child_added", (snap) => {
        const data = snap.val(); const key = snap.key;
        allMessages[key] = { ...data, _key: key };
        appendOrInsertMessage(key, data);
        maybeMarkSeen(key, data);

        // Ping sound only for genuinely new messages from others (post-load)
        if (initialLoadDone && data.user !== currentUserName) {
          playPing();
        }
      });
      db.ref("messages").limitToLast(1000).on("child_changed", (snap) => {
        const data = snap.val(); const key = snap.key;
        allMessages[key] = { ...data, _key: key };
        rerenderMessage(key);
      });
      db.ref("messages").limitToLast(1000).on("child_removed", (snap) => {
        delete allMessages[snap.key];
        const el = document.getElementById("msg-" + snap.key);
        if (el) el.remove();
        const seenEl = document.getElementById("seen-" + snap.key);
        if (seenEl) seenEl.remove();
      });
    }

    function playPing() {
      try {
        const a = document.getElementById("pingSound");
        a.currentTime = 0;
        a.play().catch(() => {});
      } catch (e) { /* ignore */ }
    }

    // Decide whether to mark a message as seen by current user
    function maybeMarkSeen(key, data) {
      if (!data || !data.user) return;
      if (data.user === currentUserName) return;
      if (data.seenBy && data.seenBy[currentUserName]) return;
      // Only mark visible messages as seen — defer a bit to ensure rendered
      setTimeout(() => {
        db.ref(`messages/${key}/seenBy/${currentUserName}`).set(firebase.database.ServerValue.TIMESTAMP)
          .catch(() => {});
      }, 800);
    }

    function appendOrInsertMessage(key, data) {
      const container = document.getElementById("messagesContainer");
      // Day divider logic
      const ts = data.timestamp || Date.now();
      const lastChild = container.lastElementChild;
      const dayStr = formatDay(ts);
      if (!lastChild || lastChild.getAttribute("data-day") !== dayStr) {
        // check if this day already exists somewhere; if not, add divider
        const existingDay = container.querySelector(`[data-day="${dayStr}"]`);
        if (!existingDay) {
          const div = document.createElement("div");
          div.className = "day-divider";
          div.setAttribute("data-day", dayStr);
          div.innerHTML = `<span>${dayStr}</span>`;
          container.appendChild(div);
        }
      }

      const node = buildMessageNode(key, data);
      container.appendChild(node);

      const seenLine = buildSeenLine(key, data);
      if (seenLine) container.appendChild(seenLine);

      scrollToBottom();
    }

    function rerenderMessage(key) {
      const existing = document.getElementById("msg-" + key);
      const data = allMessages[key];
      if (!existing || !data) return;
      const newNode = buildMessageNode(key, data);
      existing.replaceWith(newNode);

      // Seen line
      const seenExisting = document.getElementById("seen-" + key);
      const seenNew = buildSeenLine(key, data);
      if (seenNew && seenExisting) seenExisting.replaceWith(seenNew);
      else if (seenNew && !seenExisting) newNode.insertAdjacentElement("afterend", seenNew);
      else if (!seenNew && seenExisting) seenExisting.remove();
    }

    function buildMessageNode(key, data) {
      const isMe = data.user === currentUserName;
      const row = document.createElement("div");
      row.className = "msg-row " + (isMe ? "mine" : "other");
      row.id = "msg-" + key;
      row.setAttribute("data-day", formatDay(data.timestamp || Date.now()));
      if (data.reactions && Object.keys(data.reactions).length > 0) row.classList.add("has-reactions");

      // Avatar (only for others, only shows for now — could be conditional)
      const avatar = document.createElement("div");
      avatar.className = "msg-avatar show";
      avatar.setAttribute("data-user-avatar", data.user);
      renderAvatarInto(avatar, data.user);
      if (isMe) avatar.classList.remove("show");
      row.appendChild(avatar);

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";

      // Sender name for others
      if (!isMe) {
        const s = document.createElement("div");
        s.className = "msg-sender";
        s.innerText = data.user;
        s.style.color = colorFor(data.user);
        bubble.appendChild(s);
      }

      // Reply quote
      if (data.replyTo && data.replyTo.user) {
        const q = document.createElement("div");
        q.className = "msg-reply-quote";
        q.innerHTML = `<span class="qname"></span><span class="qtext"></span>`;
        q.querySelector(".qname").innerText = data.replyTo.user;
        q.querySelector(".qtext").innerText = (data.replyTo.snippet || "").substring(0, 80);
        q.onclick = () => jumpToMessage(data.replyTo.msgId);
        bubble.appendChild(q);
      }

      // Content
      if (data.fileType === "image" && data.fileUrl) {
        const img = document.createElement("img");
        img.className = "msg-image";
        img.src = data.fileUrl;
        img.onclick = (e) => { e.stopPropagation(); openLightbox(data.fileUrl); };
        bubble.appendChild(img);
      } else if (data.fileType === "voice" && data.fileUrl) {
        const v = document.createElement("div");
        v.className = "msg-voice";
        v.innerHTML = `<audio controls preload="metadata"><source src="${data.fileUrl}"></audio>`;
        bubble.appendChild(v);
      } else if (data.fileType === "doc" && data.fileUrl) {
        const f = document.createElement("a");
        f.className = "msg-file";
        f.href = data.fileUrl; f.target = "_blank";
        f.innerHTML = `<span class="file-icon">📄</span><span class="file-name"></span>`;
        f.querySelector(".file-name").innerText = data.fileName || "Document";
        bubble.appendChild(f);
      }

      if (data.text) {
        const t = document.createElement("div");
        t.className = "msg-text";
        t.innerText = data.text;
        bubble.appendChild(t);
      }

      // Meta line (time + edited)
      const meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.innerHTML = `${data.edited ? '<span class="edited">edited</span>' : ""} ${formatTime(data.timestamp)}`;
      bubble.appendChild(meta);

      // Reactions chip
      if (data.reactions) {
        const reactionCounts = {};
        for (const emoji of Object.values(data.reactions)) {
          reactionCounts[emoji] = (reactionCounts[emoji] || 0) + 1;
        }
        if (Object.keys(reactionCounts).length > 0) {
          const chip = document.createElement("div");
          chip.className = "msg-reactions";
          chip.onclick = (e) => {
            e.stopPropagation();
            // Toggle user's own reaction off if they have one
            const mine = data.reactions && data.reactions[currentUserName];
            if (mine) {
              db.ref(`messages/${key}/reactions/${currentUserName}`).remove();
            } else {
              openActionSheet(key, true);
            }
          };
          for (const [emoji, n] of Object.entries(reactionCounts)) {
            const s = document.createElement("span");
            s.innerHTML = `${emoji}<span class="count">${n > 1 ? n : ""}</span>`;
            chip.appendChild(s);
          }
          bubble.appendChild(chip);
        }
      }

      // Long-press handler
      attachLongPress(bubble, key);

      row.appendChild(bubble);
      return row;
    }

    function buildSeenLine(key, data) {
      if (data.user !== currentUserName) return null; // only show on my messages
      const seenObj = data.seenBy || {};
      const entries = Object.entries(seenObj).filter(([u]) => u !== currentUserName);
      if (entries.length === 0) return null;

      // Sort by seen time (most recent first)
      entries.sort((a, b) => (b[1] || 0) - (a[1] || 0));

      const line = document.createElement("div");
      line.className = "seen-by";
      line.id = "seen-" + key;

      // Compact summary line at top — always visible
      const otherOnline = Object.keys(onlineUsers).filter(u => u !== currentUserName);
      const everyone = otherOnline.length > 0 && otherOnline.every(u => seenObj[u]);

      let summary;
      if (everyone) {
        summary = `✓ Seen by everyone (${entries.length})`;
      } else if (entries.length === 1) {
        summary = `✓ Seen by ${entries[0][0]} at ${formatTime(entries[0][1])}`;
      } else {
        summary = `✓ Seen by ${entries.length} people — tap for details`;
      }

      const summaryEl = document.createElement("div");
      summaryEl.innerText = summary;
      line.appendChild(summaryEl);

      // Expanded details (hidden by default; shown when summary tapped)
      if (entries.length > 1) {
        const expanded = document.createElement("div");
        expanded.className = "seen-by-expanded";
        expanded.style.display = "none";
        entries.forEach(([user, ts]) => {
          const row = document.createElement("div");
          row.className = "sb-line";
          row.innerHTML = `<span class="sb-name"></span>: <span></span>`;
          row.querySelector(".sb-name").innerText = user;
          row.querySelector("span:last-child").innerText = formatDay(ts) + ", " + formatTime(ts);
          expanded.appendChild(row);
        });
        line.appendChild(expanded);

        line.onclick = () => {
          const isHidden = expanded.style.display === "none";
          expanded.style.display = isHidden ? "block" : "none";
          summaryEl.innerText = isHidden
            ? `✓ Seen by ${entries.length} people — tap to hide`
            : summary;
        };
      }

      return line;
    }

    // ════════════════════════════════════════════════════════════════════
    //  Image lightbox
    // ════════════════════════════════════════════════════════════════════
    function openLightbox(url) {
      document.getElementById("lightboxImg").src = url;
      document.getElementById("lbDownload").href = url;
      document.getElementById("lightbox").classList.add("show");
    }
    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("show");
      // Free memory by clearing src after fade-out
      setTimeout(() => { document.getElementById("lightboxImg").src = ""; }, 200);
    }

    function scrollToBottom() {
      const c = document.getElementById("messagesContainer");
      c.scrollTop = c.scrollHeight;
    }
    function jumpToMessage(id) {
      const el = document.getElementById("msg-" + id);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.style.transition = "background 0.3s";
      const orig = el.style.background;
      el.style.background = "rgba(255,204,0,0.25)";
      setTimeout(() => { el.style.background = orig; }, 1200);
    }

    function formatTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const h = d.getHours(); const m = d.getMinutes();
      const ampm = h >= 12 ? "PM" : "AM";
      const h12 = ((h % 12) || 12);
      return `${h12}:${m.toString().padStart(2,"0")} ${ampm}`;
    }
    function formatDay(ts) {
      if (!ts) return "";
      const d = new Date(ts); const today = new Date();
      const yest = new Date(); yest.setDate(today.getDate() - 1);
      const sameDay = (a, b) => a.toDateString() === b.toDateString();
      if (sameDay(d, today)) return "Today";
      if (sameDay(d, yest)) return "Yesterday";
      return d.toLocaleDateString(undefined, { weekday: "short", year: "numeric", month: "short", day: "numeric" });
    }

    // ════════════════════════════════════════════════════════════════════
    //  Sending
    // ════════════════════════════════════════════════════════════════════
    function handleSendClick() {
      if (editingMessageKey) { saveEdit(); return; }
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text && !stagedFile && !stagedVoiceBlob) return;

      const msg = {
        user: currentUserName,
        text: text || "",
        timestamp: firebase.database.ServerValue.TIMESTAMP
      };
      if (replyingTo) {
        msg.replyTo = {
          msgId: replyingTo.msgId,
          user: replyingTo.user,
          snippet: replyingTo.snippet
        };
      }

      // Upload file/voice if any
      if (stagedFile || stagedVoiceBlob) {
        const blob = stagedFile || stagedVoiceBlob;
        const name = stagedFile ? stagedFile.name : `voice_${Date.now()}.webm`;
        const type = stagedVoiceBlob ? "voice"
          : (stagedFile.type.startsWith("image/") ? "image" : "doc");
        const path = `chat_uploads/${Date.now()}_${name}`;
        try {
          const ref = storage.ref(path);
          await ref.put(blob);
          const url = await ref.getDownloadURL();
          msg.fileUrl = url; msg.fileType = type; msg.fileName = name;
        } catch (err) {
          return alert("Upload failed: " + err.message);
        }
      }

      await db.ref("messages").push(msg);
      input.value = ""; autoResize();
      clearStaged();
      cancelReply();
      updateTypingStatus("stopped");
      // Keep keyboard up / focus for continued typing
      input.focus();
    }

    function saveEdit() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return cancelEdit();
      db.ref(`messages/${editingMessageKey}`).update({ text, edited: true });
      cancelEdit();
    }

    function cancelEdit() {
      editingMessageKey = null;
      document.getElementById("chatInput").value = "";
      document.getElementById("editBanner").classList.remove("show");
      document.getElementById("sendBtn").innerHTML =
        '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
      autoResize();
    }

    function cancelReply() {
      replyingTo = null;
      document.getElementById("replyPreview").classList.remove("show");
    }

    // ════════════════════════════════════════════════════════════════════
    //  Long-press menu / actions
    // ════════════════════════════════════════════════════════════════════
    function attachLongPress(node, msgId) {
      let timer = null; let moved = false;
      const start = (e) => {
        moved = false;
        timer = setTimeout(() => {
          if (!moved) {
            // Subtle haptic confirmation on supported devices
            if (navigator.vibrate) navigator.vibrate(15);
            openActionSheet(msgId, false);
          }
        }, 450);
      };
      const cancel = () => { clearTimeout(timer); };
      node.addEventListener("touchstart", start, { passive: true });
      node.addEventListener("touchend", cancel);
      node.addEventListener("touchmove", () => { moved = true; cancel(); });
      node.addEventListener("touchcancel", cancel);
      // Desktop fallback
      node.addEventListener("mousedown", start);
      node.addEventListener("mouseup", cancel);
      node.addEventListener("mouseleave", cancel);
      // Disable context menu on long press
      node.addEventListener("contextmenu", (e) => e.preventDefault());
    }

    function openActionSheet(msgId, reactionsOnly) {
      activeSelectedMsgId = msgId;
      const data = allMessages[msgId];
      if (!data) return;
      const isMine = data.user === currentUserName;
      // Build reactions row
      const row = document.getElementById("reactionsRow");
      row.innerHTML = "";
      REACTION_EMOJIS.forEach((emoji) => {
        const b = document.createElement("button");
        b.innerText = emoji;
        b.onclick = () => reactToMessage(msgId, emoji);
        row.appendChild(b);
      });
      document.getElementById("actEdit").style.display = isMine && data.text && !data.fileUrl ? "" : "none";
      document.getElementById("actDelete").style.display = (isMine || isAdmin) ? "" : "none";
      document.getElementById("actionSheet").classList.add("show");
    }
    function hideActionSheet() {
      document.getElementById("actionSheet").classList.remove("show");
      activeSelectedMsgId = null;
    }
    function reactToMessage(msgId, emoji) {
      const ref = db.ref(`messages/${msgId}/reactions/${currentUserName}`);
      ref.once("value").then((snap) => {
        if (snap.val() === emoji) ref.remove();
        else ref.set(emoji);
      });
      hideActionSheet();
    }
    function actionReply() {
      const data = allMessages[activeSelectedMsgId]; if (!data) return;
      const snippet = data.text ? data.text.substring(0, 80)
        : data.fileType === "image" ? "📷 Photo"
        : data.fileType === "voice" ? "🎤 Voice message"
        : data.fileType === "doc" ? `📄 ${data.fileName || "Document"}` : "";
      replyingTo = { msgId: activeSelectedMsgId, user: data.user, snippet };
      document.getElementById("rpName").innerText = data.user;
      document.getElementById("rpText").innerText = snippet;
      document.getElementById("replyPreview").classList.add("show");
      hideActionSheet();
      document.getElementById("chatInput").focus();
    }
    function actionEdit() {
      const data = allMessages[activeSelectedMsgId]; if (!data || !data.text) return;
      if (data.user !== currentUserName) return;
      editingMessageKey = activeSelectedMsgId;
      const input = document.getElementById("chatInput");
      input.value = data.text; input.focus(); autoResize();
      document.getElementById("editBanner").classList.add("show");
      document.getElementById("sendBtn").innerHTML = "✓";
      hideActionSheet();
    }
    function actionCopy() {
      const data = allMessages[activeSelectedMsgId]; if (!data) return;
      const text = data.text || data.fileUrl || "";
      navigator.clipboard.writeText(text).catch(() => {});
      hideActionSheet();
    }
    function actionDelete() {
      const data = allMessages[activeSelectedMsgId]; if (!data) return;
      const isMine = data.user === currentUserName;
      if (!isMine && !isAdmin) return;
      if (!confirm("Delete this message for everyone?")) { hideActionSheet(); return; }
      db.ref(`messages/${activeSelectedMsgId}`).remove();
      hideActionSheet();
    }

    // ════════════════════════════════════════════════════════════════════
    //  File / voice staging
    // ════════════════════════════════════════════════════════════════════
    function stageFile(input) {
      const file = input.files[0]; if (!file) return;
      if (file.size / (1024 * 1024) > MAX_FILE_SIZE_MB) return alert(`Limit is ${MAX_FILE_SIZE_MB}MB`);
      stagedFile = file; stagedVoiceBlob = null; renderStaging();
    }
    function renderStaging() {
      const a = document.getElementById("stagingArea");
      if (!stagedFile && !stagedVoiceBlob) { a.classList.remove("show"); a.innerHTML = ""; return; }
      a.classList.add("show"); a.innerHTML = "";

      if (stagedFile && stagedFile.type.startsWith("image/")) {
        const img = document.createElement("img");
        img.className = "preview-img"; img.src = URL.createObjectURL(stagedFile);
        a.appendChild(img);
        const name = document.createElement("span");
        name.className = "name"; name.innerText = stagedFile.name;
        a.appendChild(name);
      } else if (stagedFile) {
        const ic = document.createElement("span"); ic.innerText = "📄"; ic.style.fontSize = "20px";
        a.appendChild(ic);
        const name = document.createElement("span");
        name.className = "name"; name.innerText = stagedFile.name;
        a.appendChild(name);
      } else if (stagedVoiceBlob) {
        // Voice — show an inline playback control so user can preview before sending
        const ic = document.createElement("span"); ic.innerText = "🎤"; ic.style.fontSize = "20px";
        a.appendChild(ic);
        const audio = document.createElement("audio");
        audio.controls = true;
        audio.src = URL.createObjectURL(stagedVoiceBlob);
        a.appendChild(audio);
      }

      const cancel = document.createElement("button");
      cancel.className = "icon-btn";
      cancel.innerText = "✕";
      cancel.style.color = "var(--text-secondary)";
      cancel.title = "Discard";
      cancel.onclick = clearStaged;
      a.appendChild(cancel);
    }
    function clearStaged() {
      stagedFile = null; stagedVoiceBlob = null;
      document.getElementById("fileInput").value = "";
      renderStaging();
    }

    async function toggleRecording() {
      const btn = document.getElementById("voiceBtn");
      const MIC_SVG = '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3s-3 1.34-3 3v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>';
      const STOP_SVG = '<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

      if (!recording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          recordedChunks = [];
          mediaRecorder.ondataavailable = (e) => { if (e.data.size) recordedChunks.push(e.data); };
          mediaRecorder.onstop = () => {
            stagedVoiceBlob = new Blob(recordedChunks, { type: "audio/webm" });
            stagedFile = null; renderStaging();
            stream.getTracks().forEach(t => t.stop());
            // Restore mic icon
            btn.innerHTML = MIC_SVG;
            btn.classList.remove("recording");
          };
          mediaRecorder.start();
          recording = true;
          // Swap to red stop icon
          btn.innerHTML = STOP_SVG;
          btn.classList.add("recording");
          document.getElementById("recOverlay").classList.add("show");
        } catch (err) {
          alert("Mic access failed: " + err.message);
        }
      } else {
        mediaRecorder.stop();
        recording = false;
        document.getElementById("recOverlay").classList.remove("show");
      }
    }

    // ════════════════════════════════════════════════════════════════════
    //  Emoji bar
    // ════════════════════════════════════════════════════════════════════
    function toggleEmojiBar() {
      const bar = document.getElementById("emojiBar");
      if (bar.children.length === 0) {
        QUICK_EMOJIS.forEach((e) => {
          const b = document.createElement("button");
          b.innerText = e;
          b.onclick = () => insertEmoji(e);
          bar.appendChild(b);
        });
      }
      bar.classList.toggle("show");
    }
    function insertEmoji(emoji) {
      const input = document.getElementById("chatInput");
      input.value += emoji;
      input.focus(); autoResize();
      updateTypingStatus("typing");
    }

    // ════════════════════════════════════════════════════════════════════
    //  Search
    // ════════════════════════════════════════════════════════════════════
    function toggleSearch() {
      const bar = document.getElementById("searchBar");
      const willShow = !bar.classList.contains("show");
      bar.classList.toggle("show");
      if (willShow) {
        document.getElementById("searchInput").focus();
      } else {
        document.getElementById("searchInput").value = "";
        clearSearchHighlights();
        searchMatches = []; searchIdx = -1;
        document.getElementById("searchStats").innerText = "";
      }
    }
    function clearSearchHighlights() {
      document.querySelectorAll(".msg-text").forEach((el) => {
        el.innerText = el.innerText; // strip <mark>
      });
    }
    function performSearch() {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      clearSearchHighlights();
      searchMatches = []; searchIdx = -1;
      if (!q) { document.getElementById("searchStats").innerText = ""; return; }
      const sortedKeys = Object.keys(allMessages).sort((a, b) =>
        (allMessages[a].timestamp || 0) - (allMessages[b].timestamp || 0));
      sortedKeys.forEach((k) => {
        const data = allMessages[k];
        if (data.text && data.text.toLowerCase().includes(q)) {
          searchMatches.push(k);
          // Highlight
          const el = document.querySelector(`#msg-${k} .msg-text`);
          if (el) {
            const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "ig");
            el.innerHTML = el.innerText.replace(re, "<mark>$1</mark>");
          }
        }
      });
      if (searchMatches.length > 0) {
        searchIdx = searchMatches.length - 1; // jump to most recent
        jumpToMessage(searchMatches[searchIdx]);
      }
      updateSearchStats();
    }
    function updateSearchStats() {
      document.getElementById("searchStats").innerText =
        searchMatches.length === 0 ? "0/0" : `${searchIdx + 1}/${searchMatches.length}`;
    }
    function searchNext() {
      if (searchMatches.length === 0) return;
      searchIdx = (searchIdx + 1) % searchMatches.length;
      jumpToMessage(searchMatches[searchIdx]); updateSearchStats();
    }
    function searchPrev() {
      if (searchMatches.length === 0) return;
      searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
      jumpToMessage(searchMatches[searchIdx]); updateSearchStats();
    }

    // ════════════════════════════════════════════════════════════════════
    //  Panel toggles
    // ════════════════════════════════════════════════════════════════════
    function toggleOnlinePanel(show) {
      document.getElementById("onlinePanel").classList.toggle("show", show);
      document.getElementById("onlineBackdrop").classList.toggle("show", show);
    }
    function toggleSettings(show) {
      document.getElementById("settingsPanel").classList.toggle("show", show);
      document.getElementById("settingsBackdrop").classList.toggle("show", show);
    }

    // ════════════════════════════════════════════════════════════════════
    //  Input UX (textarea auto-resize, typing event)
    // ════════════════════════════════════════════════════════════════════
    function autoResize() {
      const el = document.getElementById("chatInput");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 140) + "px";
    }
    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("chatInput");
      input.addEventListener("input", () => { autoResize(); updateTypingStatus("typing"); });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !navigator.userAgent.match(/Mobi/)) {
          e.preventDefault(); handleSendClick();
        }
      });
      document.getElementById("searchInput").addEventListener("input", performSearch);

      // ESC closes whichever overlay is open (desktop convenience)
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        const lb = document.getElementById("lightbox");
        if (lb.classList.contains("show")) { closeLightbox(); return; }
        const sheet = document.getElementById("actionSheet");
        if (sheet.classList.contains("show")) { hideActionSheet(); return; }
        const sp = document.getElementById("settingsPanel");
        if (sp.classList.contains("show")) { toggleSettings(false); return; }
        const op = document.getElementById("onlinePanel");
        if (op.classList.contains("show")) { toggleOnlinePanel(false); return; }
        const sb = document.getElementById("searchBar");
        if (sb.classList.contains("show")) { toggleSearch(); return; }
        if (replyingTo) { cancelReply(); return; }
        if (editingMessageKey) { cancelEdit(); return; }
      });

      // Auto-rejoin if name remembered
      const saved = localStorage.getItem("rc_name");
      if (saved) {
        document.getElementById("userName").value = saved;
        // Don't auto-start — let user confirm by tapping Join (safer)
      }
    });

    // ════════════════════════════════════════════════════════════════════
    //  Service worker registration
    // ════════════════════════════════════════════════════════════════════
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/chat-app.html" })
          .catch(err => console.log("SW reg failed", err));
      });
    }
  </script>
</body>
